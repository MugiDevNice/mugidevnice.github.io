</div><script>

/* =========================
   PI NETWORK SDK
========================= */

function setGuestMode(message = "Mode invité activé - Teste ta puissance !") {

    const welcome = document.getElementById("welcomeText");

    if (welcome) {
        welcome.innerText = message;
    }
}

function waitForPiSDK(maxWait = 10000) {

    return new Promise((resolve, reject) => {

        const start = Date.now();

        const interval = setInterval(() => {

            if (typeof Pi !== "undefined") {
                clearInterval(interval);
                resolve();
                return;
            }

            if (Date.now() - start > maxWait) {
                clearInterval(interval);
                reject(new Error("Pi SDK timeout"));
            }

        }, 250);

    });
}

async function initPiSDK() {

    try {

        console.log("Chargement Pi SDK...");

        await waitForPiSDK();

        console.log("Pi SDK détecté");

        Pi.init({
            version: "2.0"
        });

        console.log("Pi SDK initialisé");

        const authPromise = Pi.authenticate(
            ["username"],
            () => {},
            () => {}
        );

        const timeoutPromise = new Promise((_, reject) =>
            setTimeout(
                () => reject(new Error("Authentification timeout")),
                10000
            )
        );

        const auth = await Promise.race([
            authPromise,
            timeoutPromise
        ]);

        console.log("Authentification réussie :", auth);

        if (
            auth &&
            auth.user &&
            auth.user.username
        ) {

            const welcome =
                document.getElementById("welcomeText");

            if (welcome) {
                welcome.innerText =
                    `Bienvenue, ${auth.user.username} ! Teste ta puissance de shinobi`;
            }

        } else {

            setGuestMode();

        }

    } catch (error) {

        console.error(
            "Erreur Pi SDK :",
            error
        );

        setGuestMode();

    }
}

/* =========================
   LANCEMENT
========================= */

window.addEventListener("load", async () => {

    console.log("Page chargée");

    await initPiSDK();

});

/* =========================

========================= */

        {q:"Quel est le nom de famille de Sasuke ?", a:["Uchiha","Hyuga","Nara","Akimichi"], c:0},

        {q:"Quel bijuu a 8 queues ?", a:["Hachibi","Kyubi","Shukaku","Matatabi"], c:0},
        {q:"Qui est le Rikudo Sennin ?", a:["Hagoromo","Hamura","Indra","Ashura"], c:0},
        {q:"Quel est le pouvoir de Kamui ?", a:["Téléportation dimensionnelle","Feu","Vent","Eau"], c:0}
    ]
};

/* =========================
   🎮 GAME STATE
========================= */

let level = "";
let questions = [];
let index = 0;
let score = 0;
let lives = 3;
let time = 15;
let timer;

/* =========================
   🔊 SOUND (WEB AUDIO API)
========================= */

function beep(freq=440,duration=100){
    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = ctx.createOscillator();
    let gain = ctx.createGain();

    osc.frequency.value = freq;
    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    osc.stop(ctx.currentTime + duration/1000);
}

/* =========================
   🚀 START GAME
========================= */

function start(lvl){
    level = lvl;
    questions = shuffle(data[lvl]).slice(0,10);
    index = 0;
    score = 0;
    lives = 3;

    show("quiz");
    load();
}

/* =========================
   🔀 SHUFFLE
========================= */

function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}

/* =========================
   📌 LOAD QUESTION
========================= */

function load(){

    if(lives <= 0){
        return end(false);
    }

    if(index >= questions.length){
        return end(true);
    }

    let q = questions[index];

    document.getElementById("question").innerText = q.q;
    document.getElementById("score").innerText = "Score: " + score;
    document.getElementById("life").innerText = lives;

    let container = document.getElementById("answers");
    container.innerHTML = "";

    q.a.forEach((ans,i)=>{
        let btn = document.createElement("button");
        btn.className = "answer";
        btn.innerText = ans;

        btn.onclick = ()=>check(i,q.c);

        container.appendChild(btn);
    });

    startTimer();

    updateProgress();
}

/* =========================
   ⏱ TIMER
========================= */

function startTimer(){
    clearInterval(timer);
    time = 15;
    document.getElementById("time").innerText = time;

    timer = setInterval(()=>{
        time--;
        document.getElementById("time").innerText = time;

        if(time <= 0){
            clearInterval(timer);
            wrong();
        }
    },1000);
}

/* =========================
   ✔ CHECK ANSWER
========================= */

function check(i,c){

    clearInterval(timer);

    if(i === c){
        score++;
        beep(600,80);
    }else{
        wrong();
        return;
    }

    index++;
    setTimeout(load,500);
}

/* =========================
   ❌ WRONG ANSWER
========================= */

function wrong(){
    lives--;
    beep(200,200);
    index++;
    setTimeout(load,500);
}

/* =========================
   📊 PROGRESS
========================= */

function updateProgress(){
    let p = (index / 10) * 100;
    document.getElementById("progress").style.width = p + "%";
}

/* =========================
   🏁 END GAME
========================= */

function end(win){

    show("result");

    let rank = "";
    let badge = "";

    if(score <= 3){
        rank = "👹 Ninja Déserteur";
        badge = "Tu dois t'entraîner...";
    }
    else if(score <= 6){
        rank = "🥷 Genin prometteur";
        badge = "Continue ton entraînement";
    }
    else if(score <= 8){
        rank = "🔥 Jônin redoutable";
        badge = "Très bon niveau ninja";
    }
    else{
        rank = "👑 Hokage potentiel";
        badge = "Légende du village";
    }

    document.getElementById("finalScore").innerText =
        score + " / 10";

    document.getElementById("rank").innerText = rank;
    document.getElementById("badge").innerText = badge;

    save(score);
}

/* =========================
   💾 LOCAL STORAGE
========================= */

function save(s){
    let best = localStorage.getItem("ninja_best") || 0;
    if(s > best){
        localStorage.setItem("ninja_best", s);
    }
}

/* =========================
   📺 SCREEN SWITCH
========================= */

function show(id){
    document.querySelectorAll(".screen")
        .forEach(e=>e.classList.remove("active"));

    document.getElementById(id).classList.add("active");
}
