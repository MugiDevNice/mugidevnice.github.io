<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ninja Quiz Pi</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a0a0a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:90%;
    max-width:420px;
    background:#111;
    padding:20px;
    border-radius:15px;
}

h1{text-align:center;color:#ff4d00}

.screen{display:none}
.screen.active{display:block}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.level{background:#ff4d00;color:white}

.answer{
    background:#222;
    color:white;
}
.answer:hover{background:#333}

.top{
    display:flex;
    justify-content:space-between;
    font-size:14px;
}

.bar{
    height:8px;
    background:#222;
    margin:10px 0;
    border-radius:10px;
    overflow:hidden;
}

.fill{
    height:100%;
    width:0%;
    background:#ff4d00;
}

.big{text-align:center;font-size:20px;margin-top:10px}
</style>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body>

<div class="container">

<!-- START -->
<div id="start" class="screen active">
    <h1>🥷 Ninja Quiz</h1>

    <p id="welcome">Mode invité</p>

    <button class="level" onclick="start('genin')">Genin</button>
    <button class="level" onclick="start('chunin')">Chunin</button>
    <button class="level" onclick="start('kage')">Kage</button>

    <button id="payBtn" style="background:#7b2cff;color:white">
        🪙 Test Paiement Pi
    </button>
</div>

<!-- GAME -->
<div id="game" class="screen">
    <div class="top">
        <div id="score">Score: 0</div>
        <div>⏱ <span id="time">15</span></div>
        <div>❤️ <span id="life">3</span></div>
    </div>

    <div class="bar">
        <div id="progress" class="fill"></div>
    </div>

    <div id="question"></div>
    <div id="answers"></div>
</div>

<!-- END -->
<div id="end" class="screen">
    <h1>Fin</h1>
    <div class="big" id="final"></div>
</div>

</div>

<script>

/* ================= PI SAFE INIT ================= */

function initPiSafe(){
    try{
        if(!window.Pi){
            console.log("Pi non dispo → mode normal");
            return;
        }

        Pi.init({version:"2.0"});

        Pi.authenticate(["username","payments"])
        .then(auth=>{
            if(auth?.user?.username){
                document.getElementById("welcome").innerText =
                    "Bienvenue " + auth.user.username;
            }
        })
        .catch(err=>{
            console.log("Auth error",err);
        });

    }catch(e){
        console.log("Pi crash safe");
    }
}

/* ================= GAME ================= */

let data={
    genin:[
        {q:"Naruto veut devenir ?",a:["Hokage","Roi","Samurai"],c:0}
    ],
    chunin:[
        {q:"Rasengan ?",a:["Minato","Sasuke","Itachi"],c:0}
    ],
    kage:[
        {q:"1er Hokage ?",a:["Hashirama","Naruto","Kakashi"],c:0}
    ]
};

let lvl=[],i=0,score=0,life=3;
let timer=null;
let time=15;

/* ================= START ================= */

function start(l){
    lvl=data[l];
    i=0;
    score=0;
    life=3;

    show("game");
    load();
}

/* ================= LOAD ================= */

function load(){

    if(life<=0 || i>=lvl.length){
        return end();
    }

    let q=lvl[i];

    document.getElementById("question").innerText=q.q;
    document.getElementById("score").innerText="Score: "+score;
    document.getElementById("life").innerText=life;

    let box=document.getElementById("answers");
    box.innerHTML="";

    q.a.forEach((a,idx)=>{
        let b=document.createElement("button");
        b.className="answer";
        b.innerText=a;
        b.onclick=()=>check(idx,q.c);
        box.appendChild(b);
    });

    startTimer();
    progress();
}

/* ================= TIMER FIX ================= */

function startTimer(){

    clearInterval(timer);
    time=15;
    document.getElementById("time").innerText=time;

    timer=setInterval(()=>{

        time--;
        document.getElementById("time").innerText=time;

        if(time<=0){
            clearInterval(timer);
            wrong();
        }

    },1000);
}

/* ================= ANSWER ================= */

function check(i,c){

    clearInterval(timer);

    if(i===c){
        score++;
    }else{
        life--;
    }

    i++;
    load();
}

/* ================= WRONG ================= */

function wrong(){
    life--;
    i++;
    load();
}

/* ================= PROGRESS FIX ================= */

function progress(){
    let p=(i/lvl.length)*100;
    document.getElementById("progress").style.width=p+"%";
}

/* ================= END ================= */

function end(){
    show("end");
    document.getElementById("final").innerText="Score: "+score;
}

/* ================= SCREEN ================= */

function show(id){
    document.querySelectorAll(".screen")
    .forEach(e=>e.classList.remove("active"));

    document.getElementById(id).classList.add("active");
}

/* ================= PAYMENT SAFE ================= */

function initPayment(){

    const btn=document.getElementById("payBtn");

    btn.addEventListener("click", async ()=>{

        if(!window.Pi){
            alert("Pi SDK non disponible");
            return;
        }

        try{

            await Pi.createPayment(
                {
                    amount:0.1,
                    memo:"Ninja Quiz",
                    metadata:{item:"quiz"}
                },
                {
                    onReadyForServerApproval: async function(paymentId){

                        console.log("APPROVAL",paymentId);

                        await fetch("/api/approve",{
                            method:"POST",
                            headers:{"Content-Type":"application/json"},
                            body:JSON.stringify({paymentId})
                        });

                    },

                    onReadyForServerCompletion: async function(paymentId,txid){

                        console.log("COMPLETE",paymentId,txid);

                        await fetch("/api/complete",{
                            method:"POST",
                            headers:{"Content-Type":"application/json"},
                            body:JSON.stringify({paymentId,txid})
                        });

                    }
                }
            );

        }catch(e){
            console.log("PAY ERROR",e);
        }
    });
}

/* ================= BOOT ================= */

window.addEventListener("load",()=>{

    console.log("PAGE OK");

    initPiSafe();
    initPayment();

});

</script>

</body>
</html>
