<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ninja Quiz Premium</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
    min-height:100vh;
    background:radial-gradient(circle at top,#2a0000,#000);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:10px;
}

.container{
    width:90%;
    max-width:450px;
    background:rgba(10,10,10,0.95);
    border:1px solid rgba(255,80,0,0.4);
    border-radius:18px;
    padding:18px;
}

h1{text-align:center;color:#ff4d00;font-size:22px;margin-bottom:10px;}
.screen{display:none;}
.screen.active{display:block;}

.subtitle{text-align:center;font-size:13px;color:#aaa;margin-bottom:15px;}

.btn{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.level-btn{
    background:linear-gradient(45deg,#ff4d00,#ff0000);
    color:white;
}

.top-bar{display:flex;justify-content:space-between;font-size:13px;}
.timer{color:#ffcc00;}
.lives{color:#ff4d4d;}

.progress{
    width:100%;
    height:10px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
    margin:10px 0;
}
.progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#ff0000,#ff7b00);
}

.answer{
    width:100%;
    margin-top:8px;
    padding:12px;
    background:#1a1a1a;
    border:1px solid #333;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

.result{text-align:center;}
.big{font-size:22px;color:#ff7b00;margin:15px 0;}
.badge{margin-top:10px;padding:8px;border:1px solid #ff4d00;border-radius:20px;}
</style>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body>

<div class="container">

<!-- START -->
<div id="start" class="screen active">
    <h1>🥷 Ninja Quiz</h1>
    <p class="subtitle" id="welcomeText">Chargement...</p>

    <button class="btn level-btn" onclick="start('genin')">Genin</button>
    <button class="btn level-btn" onclick="start('chunin')">Chûnin</button>
    <button class="btn level-btn" onclick="start('kage')">Kage</button>

    <button id="paymentButton" class="btn" style="background:#7b2cff;color:white;">
        🪙 Test Paiement Pi
    </button>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
    <div class="top-bar">
        <div id="score">Score: 0</div>
        <div class="timer">⏱ <span id="time">15</span></div>
        <div class="lives">❤️ <span id="life">3</span></div>
    </div>

    <div class="progress">
        <div id="progress" class="progress-fill"></div>
    </div>

    <div id="question"></div>
    <div id="answers"></div>
</div>

<!-- RESULT -->
<div id="result" class="screen result">
    <h1>Terminé</h1>
    <div class="big" id="finalScore"></div>
    <div id="rank"></div>
    <div class="badge" id="badge"></div>
    <button class="btn level-btn" onclick="location.reload()">Rejouer</button>
</div>

</div>

<script>

/* ================= PI INIT ================= */

let user = null;

async function initPi(){
    try{
        console.log("Pi SDK load...");
        await Pi.init({ version: "2.0" });

        const auth = await Pi.authenticate(
            ["username","payments"],
            () => {},
            () => {}
        );

        user = auth.user.username;
        document.getElementById("welcomeText").innerText =
            "Bienvenue " + user + " 👋";

        console.log("AUTH OK", auth);

    }catch(e){
        console.log("Guest mode", e);
        document.getElementById("welcomeText").innerText =
            "Mode invité activé";
    }
}

/* ================= GAME DATA ================= */

const data = {
genin:[
{q:"Rêve de Naruto ?",a:["Hokage","Riche","Quitter","Méchant"],c:0},
{q:"Sensei équipe 7 ?",a:["Kakashi","Iruka","Jiraya","Asuma"],c:0},
{q:"Plat Naruto ?",a:["Ramen","Sushi","Riz","Poulet"],c:0},
{q:"Village ?",a:["Konoha","Suna","Kiri","Iwa"],c:0},
{q:"Démon Naruto ?",a:["Kyubi","Shukaku","Matatabi","Hachibi"],c:0}
],
chunin:[
{q:"Rasengan ?",a:["Minato","Naruto","Kakashi","Tobirama"],c:0},
{q:"Samehada ?",a:["Kisame","Itachi","Pain","Madara"],c:0},
{q:"Akatsuki ?",a:["10","9","8","7"],c:0},
{q:"Ombres ?",a:["Nara","Uchiha","Hyuga","Inuzuka"],c:0},
{q:"Sharingan ?",a:["Uchiha","Senju","Hyuga","Nara"],c:0}
],
kage:[
{q:"1er Hokage ?",a:["Hashirama","Tobirama","Hiruzen","Minato"],c:0},
{q:"Tobi ?",a:["Obito","Madara","Zetsu","Pain"],c:0},
{q:"Rinnegan ?",a:["Hagoromo","Naruto","Sasuke","Itachi"],c:0},
{q:"Uchiha massacre ?",a:["Itachi","Sasuke","Madara","Obito"],c:0},
{q:"Kamui ?",a:["Dimension","Feu","Vent","Eau"],c:0}
]
};

let lvl="",q=[],i=0,score=0,lives=3,timer;

/* ================= GAME ================= */

function start(l){
lvl=l;
q=data[l].slice().sort(()=>Math.random()-0.5);
i=0;score=0;lives=3;
show("quiz");
load();
}

function load(){
if(lives<=0)return end();
if(i>=q.length)return end();

let x=q[i];
document.getElementById("question").innerText=x.q;
document.getElementById("score").innerText="Score "+score;
document.getElementById("life").innerText=lives;

let box=document.getElementById("answers");
box.innerHTML="";

x.a.forEach((a,idx)=>{
let b=document.createElement("button");
b.className="answer";
b.innerText=a;
b.onclick=()=>check(idx,x.c);
box.appendChild(b);
});

startTimer();
updateBar();
}

function startTimer(){
clearInterval(timer);
let t=15;
document.getElementById("time").innerText=t;

timer=setInterval(()=>{
t--;
document.getElementById("time").innerText=t;
if(t<=0)wrong();
},1000);
}

function check(i,c){
clearInterval(timer);
if(i===c)score++;
else lives--;

i++;
setTimeout(load,400);
}

function wrong(){
clearInterval(timer);
lives--;
i++;
setTimeout(load,400);
}

function updateBar(){
document.getElementById("progress").style.width=(i/5)*100+"%";
}

function end(){
show("result");
document.getElementById("finalScore").innerText=score+"/5";
document.getElementById("rank").innerText=score>3?"Hokage":"Genin";
document.getElementById("badge").innerText="GG";
}

function show(id){
document.querySelectorAll(".screen").forEach(e=>e.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ================= PAYMENT ================= */

function initPayment(){

document.getElementById("paymentButton").onclick=async()=>{

try{

await Pi.createPayment({
amount:0.1,
memo:"Quiz Ninja",
metadata:{game:"ninja"}
},{
onReadyForServerApproval:async(paymentId)=>{

console.log("APPROVAL",paymentId);

await fetch("/api/approve",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({paymentId})
});

},

onReadyForServerCompletion:async(paymentId,txid)=>{

console.log("COMPLETE",paymentId,txid);

await fetch("/api/complete",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({paymentId,txid})
});

alert("Paiement OK");

},

onError:(e)=>console.log(e)
});

}catch(e){
console.log(e);
}

};

}

window.onload=async()=>{
console.log("LOAD OK");
await initPi();
initPayment();
};

</script>
</body>
</html>
