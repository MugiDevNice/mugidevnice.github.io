<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ninja Quiz Premium</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    background: radial-gradient(circle at top, #2a0000, #000);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:10px;
}

.container{
    width: 90%;
    max-width: 450px;
    background: rgba(10,10,10,0.95);
    border: 1px solid rgba(255,80,0,0.4);
    border-radius: 18px;
    padding: 18px;
    box-shadow: 0 0 25px rgba(255,50,0,0.2);
}

h1{
    text-align:center;
    color:#ff4d00;
    font-size:22px;
    margin-bottom:10px;
}

.screen{display:none;}
.screen.active{display:block;}

.subtitle{
    text-align:center;
    font-size:13px;
    color:#aaa;
    margin-bottom:15px;
}

.btn{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.level-btn{
    background: linear-gradient(45deg,#ff4d00,#ff0000);
    color:white;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    font-size:13px;
}

.progress{
    width:100%;
    height:10px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
    margin:10px 0;
}

.progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#ff0000,#ff7b00);
}

.question{margin:15px 0;}

.answer{
    background:#1a1a1a;
    border:1px solid #333;
    color:white;
    padding:12px;
    border-radius:10px;
    margin-top:8px;
    cursor:pointer;
}

.result{text-align:center;}

.big{font-size:22px;color:#ff7b00;}

.badge{
    padding:8px 12px;
    background:rgba(255,100,0,0.15);
    border:1px solid #ff4d00;
    border-radius:20px;
    display:inline-block;
    margin-top:10px;
}
</style>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body>

<div class="container">

<div id="start" class="screen active">
    <h1>🥷 Ninja Quiz</h1>

    <p class="subtitle" id="welcomeText">
        Teste ta puissance de shinobi
    </p>

    <button class="btn level-btn" onclick="start('genin')">Genin</button>
    <button class="btn level-btn" onclick="start('chunin')">Chûnin</button>
    <button class="btn level-btn" onclick="start('kage')">Kage</button>

    <button id="paymentButton" class="btn" style="background:#7b2cff;color:white;">
        🪙 Test Pi Payment (0.1 Pi)
    </button>
</div>

<div id="quiz" class="screen">
    <div class="top-bar">
        <div id="score">Score: 0</div>
        <div>⏱ <span id="time">15</span>s</div>
        <div>❤️ <span id="life">3</span></div>
    </div>

    <div class="progress">
        <div id="progress" class="progress-fill"></div>
    </div>

    <div id="question"></div>
    <div id="answers"></div>
</div>

<div id="result" class="screen result">
    <h1>Mission terminée</h1>
    <div class="big" id="finalScore"></div>
    <div id="rank"></div>
    <div class="badge" id="badge"></div>

    <button class="btn level-btn" onclick="location.reload()">Rejouer</button>
</div>

</div>

<script>
/* ================= PI SDK ================= */

function waitForPi(){
    return new Promise((res,rej)=>{
        let t = setInterval(()=>{
            if(window.Pi){
                clearInterval(t);
                res();
            }
        },200);
        setTimeout(()=>rej("timeout"),10000);
    });
}

async function initPi(){
    try{
        await waitForPi();
        Pi.init({ version:"2.0" });

        const auth = await Pi.authenticate(["username","payments"]);

        if(auth?.user?.username){
            document.getElementById("welcomeText").innerText =
                "Bienvenue, " + auth.user.username;
        }

    }catch(e){
        console.log("Pi error",e);
    }
}

/* ================= GAME ================= */

let data = {
    genin:[
        {q:"Naruto veut devenir ?",a:["Hokage","Roi","Samurai","Sannin"],c:0}
    ],
    chunin:[
        {q:"Rasengan créé par ?",a:["Minato","Naruto","Kakashi","Sasuke"],c:0}
    ],
    kage:[
        {q:"1er Hokage ?",a:["Hashirama","Tobirama","Minato","Hiruzen"],c:0}
    ]
};

let level="",questions=[],index=0,score=0,lives=3,timer;

/* ================= GAME ================= */

function start(l){
    level=l;
    questions=data[l];
    index=0;
    score=0;
    lives=3;
    show("quiz");
    load();
}

function load(){
    if(index>=questions.length || lives<=0){
        return end();
    }

    let q=questions[index];
    document.getElementById("question").innerText=q.q;
    document.getElementById("score").innerText="Score: "+score;

    let c=document.getElementById("answers");
    c.innerHTML="";

    q.a.forEach((a,i)=>{
        let b=document.createElement("button");
        b.className="answer";
        b.innerText=a;
        b.onclick=()=>check(i,q.c);
        c.appendChild(b);
    });
}

function check(i,c){
    if(i===c)score++;
    else lives--;

    index++;
    load();
}

function show(id){
    document.querySelectorAll(".screen").forEach(e=>e.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function end(){
    show("result");
    document.getElementById("finalScore").innerText=score;
    document.getElementById("rank").innerText="Fin du jeu";
}

/* ================= PI PAYMENT ================= */

function initPayment(){
    document.getElementById("paymentButton").addEventListener("click", async ()=>{

        try{
            const payment = await Pi.createPayment({
                amount:0.1,
                memo:"Ninja Quiz",
                metadata:{item:"quiz"}
            },{
                onReadyForServerApproval: async function(paymentId){

                    console.log("APPROVAL:",paymentId);

                    await fetch("/api/approve",{
                        method:"POST",
                        headers:{"Content-Type":"application/json"},
                        body:JSON.stringify({paymentId})
                    });

                },

                onReadyForServerCompletion: async function(paymentId,txid){

                    console.log("COMPLETE:",paymentId,txid);

                    await fetch("/api/complete",{
                        method:"POST",
                        headers:{"Content-Type":"application/json"},
                        body:JSON.stringify({paymentId,txid})
                    });

                    alert("Paiement OK !");
                }
            });

        }catch(e){
            console.log(e);
        }

    });
}

window.addEventListener("load",()=>{
    initPi();
    initPayment();
});
</script>

</body>
</html>
